<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Production Pipeline</title>
  <style>
    :root {
      --primary: #7c3aed;
      --primary-hover: #6d28d9;
      --bg: #0f0f11;
      --surface: #1a1a1f;
      --surface-2: #25252b;
      --text: #e4e4e7;
      --text-muted: #71717a;
      --border: #2e2e35;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Messages area ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Center the welcome text when no conversation yet */
    #messages.empty {
      justify-content: center;
      align-items: center;
    }

    .welcome {
      text-align: center;
      max-width: 480px;
    }
    .welcome h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .welcome p {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .msg {
      max-width: 720px;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: var(--primary);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.bot {
      align-self: flex-start;
      background: var(--surface-2);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }
    .msg.bot code, .msg.bot pre {
      background: #1a1a1f;
      border-radius: 6px;
      font-size: 13px;
    }
    .msg.bot pre {
      padding: 12px;
      overflow-x: auto;
      margin: 8px 0;
    }
    .msg.bot code {
      padding: 2px 5px;
    }
    .msg img {
      max-width: 100%;
      border-radius: 8px;
      margin-top: 8px;
    }

    .typing {
      align-self: flex-start;
      color: var(--text-muted);
      font-size: 14px;
      padding: 12px 16px;
    }
    .typing span {
      animation: blink 1.4s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; }
      40% { opacity: 1; }
    }

    /* ── Image preview strip ── */
    #image-preview {
      display: none;
      padding: 8px 24px 0;
      gap: 8px;
      flex-wrap: wrap;
      max-width: 780px;
      margin: 0 auto;
      width: 100%;
    }
    #image-preview.visible { display: flex; }
    .thumb-wrap {
      position: relative;
      width: 64px;
      height: 64px;
    }
    .thumb-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid var(--border);
    }
    .thumb-remove {
      position: absolute;
      top: -6px;
      right: -6px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #ef4444;
      color: #fff;
      border: none;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    /* ── Input bar ── */
    #input-bar {
      padding: 16px 24px 24px;
      display: flex;
      align-items: flex-end;
      gap: 10px;
      max-width: 780px;
      width: 100%;
      margin: 0 auto;
    }

    #attach-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      font-size: 22px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    #attach-btn:hover {
      background: var(--surface-2);
      color: var(--text);
    }

    #msg-input {
      flex: 1;
      min-height: 42px;
      max-height: 180px;
      padding: 10px 16px;
      border-radius: 21px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      line-height: 1.5;
      overflow-y: auto;
    }
    #msg-input::placeholder { color: var(--text-muted); }
    #msg-input:focus { border-color: var(--primary); }

    #send-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: none;
      background: var(--primary);
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    #send-btn:hover { background: var(--primary-hover); }
    #send-btn:disabled {
      opacity: 0.4;
      cursor: default;
    }

    #file-input { display: none; }

    /* ── Scrollbar ── */
    #messages::-webkit-scrollbar { width: 6px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Collapsible HTML code blocks ── */
    .code-toggle { margin: 8px 0; }
    .code-toggle summary {
      cursor: pointer;
      color: var(--text-muted);
      font-size: 13px;
      padding: 6px 0;
      user-select: none;
    }
    .code-toggle summary:hover { color: var(--text); }

    /* ── Rendered HTML preview ── */
    .html-preview-frame {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      margin: 8px 0;
    }

    /* ── Password gate ── */
    #password-gate {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    #password-gate.hidden { display: none; }
    .gate-box {
      text-align: center;
      max-width: 340px;
      width: 100%;
      padding: 0 24px;
    }
    .gate-box h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .gate-box p {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 24px;
    }
    .gate-box input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      margin-bottom: 12px;
    }
    .gate-box input:focus { border-color: var(--primary); }
    .gate-box button {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: none;
      background: var(--primary);
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .gate-box button:hover { background: var(--primary-hover); }
    .gate-error {
      color: #ef4444;
      font-size: 13px;
      margin-top: 8px;
      display: none;
    }
  </style>
</head>
<body>

  <!-- Password gate -->
  <div id="password-gate">
    <div class="gate-box">
      <h1>Email Production Pipeline</h1>
      <p>Enter the access code to continue</p>
      <input type="password" id="gate-input" placeholder="Access code" autofocus />
      <button id="gate-btn">Continue</button>
      <div class="gate-error" id="gate-error">Incorrect code. Try again.</div>
    </div>
  </div>

  <div id="messages" class="empty">
    <div class="welcome">
      <h1>Email Production Pipeline</h1>
      <p>Paste Figma HTML, share a screenshot, or describe the email you need.</p>
    </div>
  </div>

  <div id="image-preview"></div>

  <div id="input-bar">
    <button id="attach-btn" title="Attach image or HTML file">+</button>
    <textarea id="msg-input" rows="1" placeholder="Describe your email or paste HTML..."></textarea>
    <button id="send-btn" title="Send" disabled>&#10148;</button>
    <input type="file" id="file-input" accept="image/*,.html,.htm" multiple />
  </div>

  <script>
    // ╔═══════════════════════════════════════════════════════════╗
    // ║  SETUP: Replace the URL below with your webhook URL.     ║
    // ╚═══════════════════════════════════════════════════════════╝
    const WEBHOOK_URL = '/webhook/2b1d314a-b915-4295-8194-c53b8f339a1f/chat';

    // ── Password gate ──
    const ACCESS_CODE = 'vml2026';
    const gate = document.getElementById('password-gate');
    const gateInput = document.getElementById('gate-input');
    const gateBtn = document.getElementById('gate-btn');
    const gateError = document.getElementById('gate-error');

    if (sessionStorage.getItem('authenticated') === 'true') {
      gate.classList.add('hidden');
    }

    function tryLogin() {
      if (gateInput.value === ACCESS_CODE) {
        sessionStorage.setItem('authenticated', 'true');
        gate.classList.add('hidden');
      } else {
        gateError.style.display = 'block';
        gateInput.value = '';
        gateInput.focus();
      }
    }

    gateBtn.addEventListener('click', tryLogin);
    gateInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') tryLogin();
    });

    const messages  = document.getElementById('messages');
    const input     = document.getElementById('msg-input');
    const sendBtn   = document.getElementById('send-btn');
    const attachBtn = document.getElementById('attach-btn');
    const fileInput = document.getElementById('file-input');
    const preview   = document.getElementById('image-preview');

    let sessionId = crypto.randomUUID();
    let pendingImages = [];
    let busy = false;

    // ── Auto-resize textarea ──
    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 180) + 'px';
      updateSendBtn();
    });

    function updateSendBtn() {
      sendBtn.disabled = busy || (!input.value.trim() && pendingImages.length === 0);
    }

    // ── Attach images via + button ──
    attachBtn.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => {
      for (const file of fileInput.files) {
        if (file.name.match(/\.html?$/i)) {
          file.text().then(html => {
            input.value = html;
            input.style.height = 'auto';
            input.style.height = Math.min(input.scrollHeight, 180) + 'px';
            updateSendBtn();
          });
        } else {
          addImage(file);
        }
      }
      fileInput.value = '';
    });

    // ── Paste images into textarea ──
    input.addEventListener('paste', (e) => {
      const items = [...(e.clipboardData?.items || [])];
      for (const item of items) {
        if (item.type.startsWith('image/')) {
          e.preventDefault();
          addImage(item.getAsFile());
        }
      }
    });

    function addImage(file) {
      const reader = new FileReader();
      reader.onload = () => {
        pendingImages.push({ dataUrl: reader.result, file });
        renderPreviews();
        updateSendBtn();
      };
      reader.readAsDataURL(file);
    }

    function renderPreviews() {
      preview.innerHTML = '';
      if (pendingImages.length === 0) {
        preview.classList.remove('visible');
        return;
      }
      preview.classList.add('visible');
      pendingImages.forEach((img, i) => {
        const wrap = document.createElement('div');
        wrap.className = 'thumb-wrap';
        const thumb = document.createElement('img');
        thumb.src = img.dataUrl;
        thumb.alt = 'Attached image';
        const btn = document.createElement('button');
        btn.className = 'thumb-remove';
        btn.textContent = '\u00d7';
        btn.addEventListener('click', () => {
          pendingImages.splice(i, 1);
          renderPreviews();
          updateSendBtn();
        });
        wrap.append(thumb, btn);
        preview.appendChild(wrap);
      });
    }

    // ── Send ──
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });
    sendBtn.addEventListener('click', send);

    async function send() {
      const text = input.value.trim();
      if (!text && pendingImages.length === 0) return;
      if (busy) return;

      // Clear welcome
      const welcome = messages.querySelector('.welcome');
      if (welcome) welcome.remove();
      messages.classList.remove('empty');

      // Show user message
      const userDiv = document.createElement('div');
      userDiv.className = 'msg user';
      if (text) userDiv.textContent = text;
      pendingImages.forEach(img => {
        const el = document.createElement('img');
        el.src = img.dataUrl;
        el.alt = 'User image';
        userDiv.appendChild(el);
      });
      messages.appendChild(userDiv);
      scrollDown();

      // Build request
      const currentImages = [...pendingImages];
      const currentText = text;
      pendingImages = [];
      renderPreviews();
      input.value = '';
      input.style.height = 'auto';
      updateSendBtn();
      busy = true;
      showTyping();

      try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 120000);
        let res;
        if (currentImages.length > 0) {
          const form = new FormData();
          form.append('sessionId', sessionId);
          form.append('action', 'sendMessage');
          form.append('chatInput', currentText || 'Please review the attached image(s).');
          currentImages.forEach((img, i) =>
            form.append('files', img.file, img.file.name || 'image-' + i + '.png')
          );
          res = await fetch(WEBHOOK_URL, { method: 'POST', body: form, signal: controller.signal });
        } else {
          res = await fetch(WEBHOOK_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ sessionId, action: 'sendMessage', chatInput: currentText }),
            signal: controller.signal,
          });
        }
        clearTimeout(timeout);
        const data = await res.json();
        hideTyping();
        let reply = data.output || data.message || data.text;
        if (!reply) {
          if (data.accepted && Array.isArray(data.accepted)) {
            reply = `Email sent to ${data.accepted.join(', ')}`;
          } else if (data.body && data.body.key && data.statusCode === 201) {
            reply = `Created Jira ticket ${data.body.key}`;
          } else if (data.statusCode && data.statusMessage) {
            reply = `Action completed (${data.statusCode} ${data.statusMessage})`;
          } else {
            reply = JSON.stringify(data);
          }
        }
        addBotMessage(reply);
      } catch (err) {
        hideTyping();
        if (err.name === 'AbortError') {
          addBotMessage('The agent took too long to respond (2 min timeout). Try a simpler request or check the n8n execution log.');
        } else {
          addBotMessage('Connection error — is the n8n workflow active?');
        }
      }
      busy = false;
      updateSendBtn();
    }

    function addBotMessage(text) {
      const div = document.createElement('div');
      div.className = 'msg bot';

      // Detect if the response contains a standalone HTML document or large HTML block
      const htmlMatch = text.match(/(<!DOCTYPE[\s\S]*<\/html>|<html[\s\S]*<\/html>)/i);
      if (htmlMatch) {
        const rawHtml = htmlMatch[1];
        const before = text.slice(0, htmlMatch.index).trim();
        const after = text.slice(htmlMatch.index + rawHtml.length).trim();

        // Text before the HTML
        if (before) {
          const p = document.createElement('p');
          p.textContent = before;
          div.appendChild(p);
        }

        // Rendered preview in a sandboxed iframe
        const iframe = document.createElement('iframe');
        iframe.className = 'html-preview-frame';
        iframe.sandbox = 'allow-same-origin';
        iframe.style.height = '400px';
        iframe.addEventListener('load', () => {
          try {
            const h = iframe.contentDocument.documentElement.scrollHeight;
            iframe.style.height = Math.min(h + 20, 600) + 'px';
          } catch (_) {}
        });
        div.appendChild(iframe);

        // Collapsible raw code
        const details = document.createElement('details');
        details.className = 'code-toggle';
        details.innerHTML = '<summary>View HTML source</summary><pre><code>' + escapeHtml(rawHtml) + '</code></pre>';
        div.appendChild(details);

        // Text after the HTML
        if (after) {
          const p2 = document.createElement('p');
          p2.textContent = after;
          div.appendChild(p2);
        }

        messages.appendChild(div);
        // Write HTML into iframe after it's in the DOM
        iframe.contentDocument.open();
        iframe.contentDocument.write(rawHtml);
        iframe.contentDocument.close();
      } else {
        let html = escapeHtml(text);
        // Hide HTML code blocks behind a collapsible toggle
        html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
          if (code.trim().match(/^&lt;!DOCTYPE|^&lt;html|^&lt;table|^&lt;div|^&lt;head/i)) {
            return '<details class="code-toggle"><summary>View HTML code</summary><pre><code>' + code + '</code></pre></details>';
          }
          return '<pre><code>' + code + '</code></pre>';
        });
        html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
        html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
        div.innerHTML = html;
        messages.appendChild(div);
      }
      scrollDown();
    }

    function escapeHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    function showTyping() {
      const el = document.createElement('div');
      el.className = 'typing';
      el.id = 'typing-indicator';
      el.innerHTML = '<span>.</span><span>.</span><span>.</span>';
      messages.appendChild(el);
      scrollDown();
    }

    function hideTyping() {
      const el = document.getElementById('typing-indicator');
      if (el) el.remove();
    }

    function scrollDown() {
      messages.scrollTop = messages.scrollHeight;
    }
  </script>
</body>
</html>
